services:
  mysql:
    image: mysql:8.4
    container_name: graphops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: graphops_root
      MYSQL_DATABASE: graphops
      MYSQL_USER: graphops
      MYSQL_PASSWORD: graphops
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pgraphops_root"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - graphops-mysql-data:/var/lib/mysql
  redis:
    image: redis:7.4
    container_name: graphops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: graphops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  grafana:
    image: grafana/grafana:12.1.1
    container_name: graphops-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  graphops-mysql-data:
